<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR — Hope Clinic</title>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f5f5f3;color:#111;min-height:100vh}
[v-cloak]{display:none}
.wrap{max-width:900px;margin:0 auto;padding:1.5rem 1rem}
.card{background:#fff;border:1px solid #e5e5e3;border-radius:12px;padding:1rem 1.25rem}
.card-sm{background:#fff;border:1px solid #e5e5e3;border-radius:10px;padding:10px 14px}
h1{font-size:22px;font-weight:600;margin-bottom:4px}
h2{font-size:16px;font-weight:600;margin-bottom:12px}
label{display:block;font-size:12px;color:#666;margin-bottom:4px}
input,select{width:100%;padding:8px 10px;border:1px solid #d0d0ce;border-radius:8px;font-size:14px;background:#fff;color:#111;outline:none}
input:focus,select:focus{border-color:#378ADD;box-shadow:0 0 0 3px #378ADD18}
input[type=date]{color:#111}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:8px;border:1px solid #d0d0ce;background:#fff;color:#111;font-size:13px;cursor:pointer}
.btn:hover{background:#f5f5f3}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:#E6F1FB;color:#042C53;border-color:#185FA5}
.btn-success{background:#E1F5EE;color:#04342C;border-color:#1D9E75}
.btn-danger{background:#FCEBEB;color:#501313;border-color:#E24B4A}
.btn-print{background:#534AB7;color:#fff;border-color:#534AB7}
.btn-print:hover{background:#3C3489;color:#fff}
.btn-sm{padding:5px 12px;font-size:12px}
.tab{padding:6px 14px;border-radius:8px;border:1px solid #d0d0ce;background:transparent;color:#666;font-size:13px;cursor:pointer}
.tab.active{background:#ebebea;border-color:#999;color:#111;font-weight:500}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.25rem}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.metric{background:#f0f0ee;border-radius:8px;padding:10px 14px}
.metric .lbl{font-size:11px;color:#666;margin-bottom:2px}
.metric .val{font-size:22px;font-weight:600}
.row{display:flex;align-items:center;gap:12px}
.row-top{display:flex;align-items:flex-start;gap:10px}
.stack{display:flex;flex-direction:column;gap:8px}
.badge{display:inline-block;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:500;white-space:nowrap}
.sep{border:none;border-top:1px solid #e5e5e3;margin:12px 0}
.att-btn{font-size:11px;padding:3px 8px;border-radius:6px;border:1px solid #ddd;background:transparent;color:#666;cursor:pointer;white-space:nowrap}
.flex{display:flex}.flex-wrap{flex-wrap:wrap}.items-center{align-items:center}.justify-between{justify-content:space-between}
.flex1{flex:1;min-width:0}
.f11{font-size:11px}.f12{font-size:12px}.f13{font-size:13px}.f14{font-size:14px}.fw5{font-weight:500}.fw6{font-weight:600}
.text-muted{color:#666}.text-hint{color:#aaa}.ellipsis{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gap6{gap:6px}.gap8{gap:8px}.gap10{gap:10px}.gap12{gap:12px}
.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}
.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}
.topbar{background:#fff;border-bottom:1px solid #e5e5e3;padding:12px 1rem}
.topbar-inner{max-width:900px;margin:0 auto;display:flex;align-items:center;gap:12px}
.err{color:#A32D2D;font-size:13px;margin-top:4px}
.ok{color:#0F6E56;font-size:13px;margin-top:4px}
.hint{font-size:11px;color:#aaa;border-top:1px solid #eee;padding-top:10px;margin-top:4px;line-height:1.6}
.loader{display:flex;align-items:center;justify-content:center;min-height:100vh;color:#666;font-size:14px}
.kp-box{background:#EAF3DE;border:1px solid #97C459;border-radius:8px;padding:10px 14px;font-size:12px;color:#27500A}

/* ── SIATKA OBECNOŚCI ── */
.att-grid{overflow-x:auto;margin-bottom:1rem}
.att-table{border-collapse:collapse;font-size:11px;white-space:nowrap}
.att-table th{padding:4px 3px;font-weight:500;color:#666;border-bottom:1px solid #e5e5e3;text-align:center;min-width:26px}
.att-table th.name-col{text-align:left;min-width:140px;padding-left:8px}
.att-table th.sum-col{min-width:50px;color:#333}
.att-table td{padding:2px 2px;text-align:center;border-bottom:1px solid #f5f5f5;vertical-align:middle}
.att-table td.name-cell{text-align:left;padding-left:8px;font-weight:500;font-size:12px;min-width:140px}
.att-table td.sum-cell{font-size:11px;color:#666;text-align:center;padding:2px 4px}
.att-table tr:last-child td{border-bottom:none}
.att-table tr:nth-child(even) td{background:#fafaf8}
.day-cell{width:24px;height:24px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;cursor:pointer;margin:1px auto;transition:opacity .1s}
.day-cell:hover{opacity:.8}
.day-cell.weekend{opacity:.35;cursor:default}
.day-cell.empty{background:transparent;cursor:pointer}
.day-cell.empty:hover{background:#f0f0ee}
.th-weekend{color:#ccc!important}
.th-today{color:#185FA5!important;font-weight:700!important}

/* ── DRUK ── */
.print-only{display:none}
@media print{
  body{background:#fff;font-size:9pt}
  .no-print,.topbar,.tabs{display:none!important}
  .print-only{display:block!important}
  .wrap{padding:0;max-width:100%}
  .print-header{margin-bottom:10px}
  .print-header h1{font-size:13pt;font-weight:700;margin-bottom:2px}
  .print-header p{font-size:9pt;color:#333}
  .print-legend{display:flex;gap:12pt;font-size:8pt;color:#444;margin-bottom:8pt;flex-wrap:wrap}
  .print-att-table{width:100%;border-collapse:collapse;font-size:7.5pt}
  .print-att-table th{border:0.5pt solid #333;padding:3pt 2pt;background:#f0f0f0;font-weight:700;text-align:center;white-space:nowrap}
  .print-att-table th:first-child{text-align:left;min-width:90pt}
  .print-att-table td{border:0.5pt solid #bbb;padding:3pt 2pt;text-align:center;white-space:nowrap}
  .print-att-table td:first-child{text-align:left;font-weight:600;padding-left:4pt}
  .print-att-table td.sig-cell{min-width:60pt;height:28pt;vertical-align:bottom;font-size:7pt;color:#888;padding-bottom:2pt}
  .print-att-table th.we{color:#aaa}
  .print-att-table td.we{color:#aaa;background:#fafafa}
  .print-footer{font-size:7.5pt;color:#666;border-top:0.5pt solid #aaa;padding-top:5pt;margin-top:5pt}
  .print-sigs{display:flex;justify-content:space-between;margin-top:28pt;font-size:8.5pt}
  .print-sigs div{border-top:0.5pt solid #333;min-width:140pt;padding-top:3pt}
  @page{size:A4 landscape;margin:12mm}
  .emp-page{page-break-after:always}
  .emp-page:last-child{page-break-after:avoid}
}
@media(max-width:600px){.grid2,.grid3,.grid4{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="app" v-cloak>
  <div v-if="loading" class="loader">Ładowanie danych...</div>

  <!-- LOGIN -->
  <div v-else-if="!currentUser" style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem">
    <div style="width:100%;max-width:340px">
      <h1 class="mb8">Hope Clinic HR</h1>
      <p class="text-muted f13 mb16">Ewidencja czasu pracy i urlopów</p>
      <div class="card" style="display:flex;flex-direction:column;gap:12px">
        <div><label>Login</label><input v-model="loginForm.login" @keyup.enter="doLogin" placeholder="np. anna.kowalska" autofocus/></div>
        <div><label>Hasło</label><input type="password" v-model="loginForm.password" @keyup.enter="doLogin"/></div>
        <div v-if="loginError" class="err">{{ loginError }}</div>
        <button class="btn btn-primary" style="width:100%;padding:9px;font-size:14px;justify-content:center" @click="doLogin" :disabled="loginLoading">
          {{ loginLoading ? 'Logowanie...' : 'Zaloguj się' }}
        </button>
        <div class="hint">Pierwsze uruchomienie: admin / admin123</div>
      </div>
    </div>
  </div>

  <template v-else>
    <div class="topbar no-print">
      <div class="topbar-inner">
        <div :style="`width:36px;height:36px;background:${avatarBg(currentUser.id)};color:${avatarColor(currentUser.id)};border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0`">{{ initials(currentUser.name) }}</div>
        <div class="flex1">
          <div class="fw5 f14">{{ currentUser.name }}</div>
          <div class="f12 text-muted">{{ currentUser.role==='admin'?'Administrator':currentUser.position }}</div>
        </div>
        <button class="btn btn-sm" @click="doLogout">Wyloguj</button>
      </div>
    </div>

    <!-- ═══ ADMIN ═══ -->
    <div v-if="currentUser.role==='admin'" class="wrap">
      <div class="tabs no-print">
        <button :class="['tab',adminTab==='today'&&'active']" @click="adminTab='today'">Dziś</button>
        <button :class="['tab',adminTab==='employees'&&'active']" @click="adminTab='employees'">Pracownicy</button>
        <button :class="['tab',adminTab==='leaves'&&'active']" @click="adminTab='leaves'">Urlopy{{ pendingCount>0?` (${pendingCount})`:'' }}</button>
        <button :class="['tab',adminTab==='reports'&&'active']" @click="adminTab='reports'">Raporty / Lista obecności</button>
      </div>

      <!-- DZIŚ -->
      <div v-if="adminTab==='today'">
        <p class="f13 text-muted mb12">{{ todayLabel }}</p>
        <div class="grid4 mb16">
          <div class="metric" v-for="m in todayMetrics" :key="m.label">
            <div class="lbl">{{ m.label }}</div>
            <div class="val" :style="`color:${m.color}`">{{ m.val }}</div>
          </div>
        </div>
        <div class="stack">
          <div class="card-sm row" v-for="emp in employees" :key="emp.id">
            <div :style="`width:32px;height:32px;background:${avatarBg(emp.id)};color:${avatarColor(emp.id)};border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0`">{{ initials(emp.name) }}</div>
            <div class="flex1" style="min-width:0">
              <div class="fw5 f13 ellipsis">{{ emp.name }}</div>
              <div class="f12 text-muted">{{ emp.position }}</div>
            </div>
            <div class="flex flex-wrap gap6 items-center" style="justify-content:flex-end">
              <button v-for="a in ATT" :key="a.key" class="att-btn"
                :style="getAtt(emp.id,today)===a.key?`background:${a.bg};color:${a.text};border-color:${a.color};font-weight:500`:''"
                @click="toggleAtt(emp.id,today,a.key)">{{ a.short }}</button>
              <span v-if="getNote(emp.id,today)?.modifier" class="badge" :style="`background:${MOD_MAP[getNote(emp.id,today)?.modifier]?.bg};color:${MOD_MAP[getNote(emp.id,today)?.modifier]?.color};font-size:10px`" :title="getNote(emp.id,today)?.note">{{ MOD_MAP[getNote(emp.id,today)?.modifier]?.label }}</span>
            </div>
          </div>
        </div>
        <!-- Admin note editor for today -->
        <div class="card mt12" style="padding:10px 14px">
          <div class="f12 text-muted mb8">Notatki do dzisiejszego dnia</div>
          <div class="stack">
            <div v-for="emp in employees" :key="'note'+emp.id" class="flex items-center gap8" style="font-size:12px">
              <span style="min-width:140px;font-weight:500">{{ emp.name }}</span>
              <select style="width:auto;font-size:12px" @change="e=>saveNote(emp.id,today,e.target.value,getNote(emp.id,today)?.note||'')" :value="getNote(emp.id,today)?.modifier||''">
                <option v-for="m in MODIFIERS" :key="m.key" :value="m.key">{{ m.label }}</option>
              </select>
              <input style="flex:1;font-size:12px;padding:5px 8px" :value="getNote(emp.id,today)?.note||''" @change="e=>saveNote(emp.id,today,getNote(emp.id,today)?.modifier||'',e.target.value)" placeholder="notatka..."/>
              <span class="f11 text-hint">{{ emp.workStart||'08:00' }}–{{ emp.workEnd||'16:00' }}</span>
            </div>
          </div>
        </div>
      </div>

      <!-- PRACOWNICY -->
      <div v-if="adminTab==='employees'">
        <div v-if="empForm.open" class="card mb12">
          <h2>{{ empForm.id?'Edycja: '+empForm.name:'Nowy pracownik' }}</h2>
          <div class="grid2 mb12">
            <div><label>Imię i nazwisko</label><input v-model="empForm.name"/></div>
            <div><label>Login</label><input v-model="empForm.login"/></div>
            <div><label>Hasło</label><input type="password" v-model="empForm.password"/></div>
            <div><label>Stanowisko</label><input v-model="empForm.position"/></div>
            <div><label>Dział</label><input v-model="empForm.department"/></div>
            <div><label>Data zatrudnienia</label><input type="date" v-model="empForm.hireDate" @change="autoCalcEntitlement"/></div>
            <div>
              <label>Poprzedni staż pracy (lata)</label>
              <input type="number" min="0" max="50" v-model.number="empForm.prevWorkYears" @input="autoCalcEntitlement"/>
              <div class="f11 text-hint mt8">Wlicz lata nauki: studia +8, liceum +4, technikum +5</div>
            </div>
            <div>
              <label>Wymiar urlopu (dni/rok)</label>
              <input type="number" min="0" max="30" v-model.number="empForm.leaveEntitlement"/>
              <div v-if="empForm.hireDate" class="kp-box mt8">
                KP sugeruje: <b>{{ suggestedEntitlement }} dni</b> (łączny staż ~{{ totalStaz }} lat)<br>
                <span class="f11">{{ totalStaz>=10?'≥10 lat → 26 dni':'&lt;10 lat → 20 dni' }} · art. 154 KP</span>
              </div>
            </div>
            <div><label>Godzina przyjścia (standardowa)</label><input type="time" v-model="empForm.workStart"/></div>
            <div><label>Godzina wyjścia (standardowa)</label><input type="time" v-model="empForm.workEnd"/></div>
            <div><label>Rola</label>
              <select v-model="empForm.role">
                <option value="employee">Pracownik</option>
                <option value="admin">Administrator</option>
              </select>
            </div>
          </div>
          <div class="flex gap8">
            <button class="btn btn-success" @click="saveEmployee">Zapisz</button>
            <button class="btn" @click="empForm.open=false">Anuluj</button>
          </div>
        </div>
        <div class="flex justify-between items-center mb12">
          <span class="f13 text-muted">{{ employees.length }} pracowników</span>
          <button class="btn btn-primary btn-sm" @click="openAddEmp">+ Dodaj pracownika</button>
        </div>
        <div class="stack">
          <div class="card-sm row" v-for="u in allUsers" :key="u.id">
            <div :style="`width:36px;height:36px;background:${avatarBg(u.id)};color:${avatarColor(u.id)};border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0`">{{ initials(u.name) }}</div>
            <div class="flex1"><div class="fw5 f13">{{ u.name }}</div><div class="f12 text-muted">{{ u.position }} · {{ u.department }}</div></div>
            <div class="f12 text-muted" style="text-align:right;margin-right:10px">
              <div>Urlop: <b>{{ u.leaveEntitlement }}d</b></div>
              <div class="f11 text-hint">{{ u.login }}</div>
            </div>
            <div class="flex gap6">
              <button class="btn btn-sm" @click="openEditEmp(u)">Edytuj</button>
              <button v-if="u.role!=='admin'" class="btn btn-sm btn-danger" @click="deleteEmployee(u.id)">Usuń</button>
            </div>
          </div>
        </div>
      </div>

      <!-- URLOPY -->
      <div v-if="adminTab==='leaves'">
        <div class="flex flex-wrap gap6 mb12">
          <button v-for="f in leaveFilters" :key="f.key" :class="['tab',leaveFilter===f.key&&'active']" @click="leaveFilter=f.key">{{ f.label }}</button>
        </div>
        <div v-if="filteredLeaves.length===0" class="f13 text-hint" style="padding:1rem 0">Brak wniosków</div>
        <div class="stack">
          <div class="card-sm" v-for="req in filteredLeaves" :key="req.id">
            <div class="row-top">
              <div :style="`width:32px;height:32px;background:${avatarBg(req.userId)};color:${avatarColor(req.userId)};border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;margin-top:2px`">{{ initials(req.userName||'?') }}</div>
              <div class="flex1">
                <div class="flex items-center flex-wrap gap6 mb8">
                  <span class="fw5 f13">{{ req.userName }}</span>
                  <span class="badge" :style="`background:${LT[req.type]?.bg};color:${LT[req.type]?.text}`">{{ LT[req.type]?.label }}</span>
                  <span class="badge" :style="statusBadge(req.status)">{{ statusLabel(req.status) }}</span>
                </div>
                <div class="f12 text-muted">{{ fmtD(req.dateFrom) }} – {{ fmtD(req.dateTo) }} · <b>{{ req.days }} dni rob.</b>{{ req.note?' · '+req.note:'' }}</div>
                <div v-if="req.status==='pending'" class="f11 text-hint mt8">Saldo pracownika: {{ getUserBalance(req.userId) }} dni pozostałych</div>
              </div>
              <div class="flex gap6" style="flex-shrink:0">
                <template v-if="req.status==='pending'">
                  <button class="btn btn-sm btn-success" @click="resolveLeave(req.id,'approved')">Zatwierdź</button>
                  <button class="btn btn-sm btn-danger" @click="resolveLeave(req.id,'rejected')">Odrzuć</button>
                </template>
                <button v-if="req.status==='approved'" class="btn btn-sm btn-danger" @click="cancelLeave(req.id)">Cofnij urlop</button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- RAPORTY / LISTA OBECNOŚCI -->
      <div v-if="adminTab==='reports'">

        <!-- kontrolki ekranowe -->
        <div class="flex items-center gap12 mb16 no-print" style="flex-wrap:wrap">
          <div class="flex items-center gap8">
            <label style="display:inline;margin:0;font-size:13px;color:#666">Miesiąc:</label>
            <input type="month" v-model="reportMonth" style="width:auto"/>
          </div>
          <div class="flex items-center gap8">
            <label style="display:inline;margin:0;font-size:13px;color:#666">Pracownik:</label>
            <select v-model="reportEmpFilter" style="width:auto;min-width:160px">
              <option value="">Wszyscy</option>
              <option v-for="emp in employees" :key="emp.id" :value="emp.id">{{ emp.name }}</option>
            </select>
          </div>
          <span class="f12 text-hint">Dni robocze: {{ workDaysInMonth }}</span>
          <button class="btn btn-print btn-sm" @click="printReport">&#128438; Drukuj zbiorczy</button>
          <button class="btn btn-sm" style="background:#E1F5EE;color:#04342C;border-color:#1D9E75" @click="printIndividual">&#128438; Drukuj każdego osobno</button>
          <button class="btn btn-sm" style="background:#EAF3DE;color:#27500A;border-color:#639922" @click="exportExcel">&#128190; Eksport Excel</button>
        </div>

        <!-- legenda statusów -->
        <div class="flex flex-wrap gap8 mb12 no-print">
          <span v-for="a in ATT" :key="a.key" class="flex items-center gap6 f12 text-muted">
            <span class="badge" style="font-size:10px;padding:2px 6px" :style="`background:${a.bg};color:${a.text}`">{{ a.short }}</span>{{ a.label }}
          </span>
          <span class="f12 text-hint">· Kliknij komórkę żeby zmienić status</span>
        </div>

        <!-- SIATKA OBECNOŚCI (ekranowa, edytowalna) -->
        <div class="att-grid no-print">
          <table class="att-table">
            <thead>
              <tr>
                <th class="name-col">Pracownik</th>
                <th v-for="d in reportDays" :key="d.date"
                  :class="['',d.isWeekend&&'th-weekend',d.isToday&&'th-today']">
                  <div>{{ d.wd }}</div>
                  <div>{{ d.num }}</div>
                </th>
                <th class="sum-col">OB</th>
                <th class="sum-col">UR</th>
                <th class="sum-col">HO</th>
                <th class="sum-col">NB</th>
                <th class="sum-col">%</th>
                <th class="sum-col">Urlop</th>
              </tr>
            </thead>
            <tbody>
              <tr v-for="emp in reportEmployees" :key="emp.id">
                <td class="name-cell">{{ emp.name }}</td>
                <td v-for="d in reportDays" :key="d.date" style="padding:1px 1px">
                  <div v-if="d.isWeekend" class="day-cell weekend" :style="`background:#f0f0ee;color:#ccc`">–</div>
                  <div v-else class="day-cell" @click="cycleAtt(emp.id,d.date)"
                    :style="getCellStyle(emp.id,d.date)">
                    {{ getAtt(emp.id,d.date) ? ATT_MAP[getAtt(emp.id,d.date)]?.short : '?' }}
                  </div>
                </td>
                <td class="sum-cell" style="color:#0F6E56;font-weight:500">{{ empSummary(emp.id).obecny }}</td>
                <td class="sum-cell" style="color:#185FA5;font-weight:500">{{ empSummary(emp.id).urlop }}</td>
                <td class="sum-cell" style="color:#BA7517;font-weight:500">{{ empSummary(emp.id).home }}</td>

<script>
const firebaseConfig = {

  authDomain: "hope-clinic-kardy.firebaseapp.com",

  storageBucket: "hope-clinic-kardy.firebasestorage.app",

  appId: "1:360029177116:web:5644e4460fef71abe2e6d9"

const LEAVE_TYPES=[
  {key:"wypoczynkowy",label:"Urlop wypoczynkowy",bg:"#E6F1FB",text:"#042C53"},
  {key:"zadanie",label:"Na żądanie (art. 167²)",bg:"#FAEEDA",text:"#412402"},
  {key:"okolicznosciowy",label:"Okolicznościowy",bg:"#FBEAF0",text:"#4B1528"},
  {key:"bezplatny",label:"Bezpłatny",bg:"#F1EFE8",text:"#2C2C2A"},
  {key:"chorobowy",label:"Chorobowy (L4)",bg:"#FCEBEB",text:"#501313"},
];
const LT=Object.fromEntries(LEAVE_TYPES.map(l=>[l.key,l]));

const ATT=[
  {key:"obecny",label:"Obecny",short:"OB",color:"#0F6E56",bg:"#E1F5EE",text:"#04342C"},
  {key:"nieobecny",label:"Nieobecny",short:"NB",color:"#A32D2D",bg:"#FCEBEB",text:"#501313"},
  {key:"home",label:"Home office",short:"HO",color:"#BA7517",bg:"#FAEEDA",text:"#412402"},
  {key:"delegacja",label:"Delegacja",short:"DL",color:"#534AB7",bg:"#EEEDFE",text:"#26215C"},
  {key:"urlop",label:"Urlop",short:"UR",color:"#185FA5",bg:"#E6F1FB",text:"#042C53"},
];
const ATT_MAP=Object.fromEntries(ATT.map(a=>[a.key,a]));
const ATT_KEYS=ATT.map(a=>a.key);

const DEFAULT_ADMIN={name:"Administrator",login:"admin",password:"admin123",role:"admin",department:"Zarząd",position:"Administrator",hireDate:"2019-01-01",prevWorkYears:0,leaveEntitlement:26};
const AVC_BG=["#E6F1FB","#E1F5EE","#FBEAF0","#FAEEDA","#EEEDFE","#FCEBEB"];
const AVC_COL=["#185FA5","#0F6E56","#993556","#854F0B","#534AB7","#993C1D"];
const todayStr=()=>new Date().toISOString().slice(0,10);
const thisYear=()=>new Date().getFullYear();
const workDaysBetween=(from,to)=>{if(!from||!to||to<from)return 0;let n=0;const d=new Date(from+"T12:00:00"),e=new Date(to+"T12:00:00");while(d<=e){const ds=d.toISOString().slice(0,10);if(isWorkDay(ds))n++;d.setDate(d.getDate()+1);}return n;};
const POLISH_HOLIDAYS=(year)=>{
  // Stałe święta
  const fixed=[
    `${year}-01-01`,`${year}-01-06`,`${year}-05-01`,`${year}-05-03`,
    `${year}-08-15`,`${year}-11-01`,`${year}-11-11`,`${year}-12-25`,`${year}-12-26`
  ];
  // Wielkanoc (algorytm Gaussa)
  const a=year%19,b=Math.floor(year/100),c=year%100;
  const d2=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3);
  const h=(19*a+b-d2-g+15)%30,i=Math.floor(c/4),k=c%4;
  const l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451);
  const month=Math.floor((h+l-7*m+114)/31),day=((h+l-7*m+114)%31)+1;
  const easter=new Date(year,month-1,day);
  const easterStr=easter.toISOString().slice(0,10);
  // Poniedziałek wielkanocny
  const em=new Date(easter); em.setDate(em.getDate()+1);
  // Zielone Świątki (49 dni po Wielkanocy)
  const wh=new Date(easter); wh.setDate(wh.getDate()+49);
  // Boże Ciało (60 dni po Wielkanocy)
  const cc=new Date(easter); cc.setDate(cc.getDate()+60);
  return new Set([...fixed, easterStr, em.toISOString().slice(0,10), wh.toISOString().slice(0,10), cc.toISOString().slice(0,10)]);
};
const isHoliday=(date)=>{const year=parseInt(date.slice(0,4));return POLISH_HOLIDAYS(year).has(date);};
const isWorkDay=(date)=>{const d=new Date(date+"T12:00:00");const day=d.getDay();return day!==0&&day!==6&&!isHoliday(date);};

const fmtD=d=>d?new Date(d+"T12:00:00").toLocaleDateString("pl-PL",{day:"numeric",month:"short",year:"numeric"}):"";
const calcKPEntitlement=(hireDate,prevWorkYears=0)=>{
  if(!hireDate)return 20;
  const hired=new Date(hireDate+"T12:00:00"),now=new Date();
  const yearsHere=(now-hired)/(1000*60*60*24*365.25);
  const totalStaz=(prevWorkYears||0)+yearsHere;
  const base=totalStaz>=10?26:20;
  if(yearsHere<1){const months=(now-hired)/(1000*60*60*24*30.44);return Math.min(Math.floor((base/12)*Math.ceil(months)),base);}
  return base;
};

const {createApp,ref,computed,onMounted}=Vue;
createApp({
  setup(){
    let db=null;
    try{firebase.initializeApp(firebaseConfig);db=firebase.firestore();}catch(e){console.error(e);}

    const loading=ref(true);
    const currentUser=ref(null);
    const allUsers=ref([]);
    const attendance=ref({});
    const leaveReqs=ref([]);
    const loginForm=ref({login:"",password:""});
    const loginError=ref("");
    const loginLoading=ref(false);
    const adminTab=ref("today");
    const empTab=ref("today");
    const leaveFilter=ref("pending");
    const reportMonth=ref(new Date().toISOString().slice(0,7));
    const reportEmpFilter=ref("");
    const printMode=ref('');
    const historyMonth=ref(new Date().toISOString().slice(0,7));
    const currentMonthStr=new Date().toISOString().slice(0,7);
    const empForm=ref({open:false});
    const leaveForm=ref({type:"wypoczynkowy",dateFrom:"",dateTo:"",note:""});
    const leaveMsg=ref(null);
    const notes=ref({});

    const today=computed(()=>todayStr());
    const employees=computed(()=>allUsers.value.filter(u=>u.role==="employee"));
    const todayLabel=computed(()=>new Date().toLocaleDateString("pl-PL",{weekday:"long",day:"numeric",month:"long",year:"numeric"}));

    const todayMetrics=computed(()=>{
      const c={obecny:0,nieobecny:0,home:0,delegacja:0};
      employees.value.forEach(e=>{const s=getAtt(e.id,today.value);if(s&&c[s]!==undefined)c[s]++;});
      const unmarked=employees.value.filter(e=>!getAtt(e.id,today.value)).length;
      return[{label:"Obecni",val:c.obecny,color:"#0F6E56"},{label:"Nieobecni",val:c.nieobecny,color:"#A32D2D"},{label:"Home/Del.",val:c.home+c.delegacja,color:"#534AB7"},{label:"Bez statusu",val:unmarked,color:"#999"}];
    });

    const pendingCount=computed(()=>leaveReqs.value.filter(r=>r.status==="pending").length);
    const leaveFilters=computed(()=>[
      {key:"pending",label:`Oczekujące (${pendingCount.value})`},
      {key:"approved",label:"Zatwierdzone"},
      {key:"rejected",label:"Odrzucone"},
      {key:"cancelled",label:"Anulowane"},
      {key:"all",label:"Wszystkie"},
    ]);
    const filteredLeaves=computed(()=>leaveReqs.value.filter(r=>leaveFilter.value==="all"||r.status===leaveFilter.value).sort((a,b)=>b.createdAt.localeCompare(a.createdAt)));

    // RAPORT - dni miesiąca
    const reportDays=computed(()=>{
      const[year,mon]=reportMonth.value.split("-").map(Number);
      const dim=new Date(year,mon,0).getDate();
      const t=today.value;
      return Array.from({length:dim},(_,i)=>{
        const dt=new Date(year,mon-1,i+1);
        const date=dt.toISOString().slice(0,10);
        const day=dt.getDay();
        const holiday=isHoliday(date);
        return{
          date,
          num:i+1,
          wd:dt.toLocaleDateString("pl-PL",{weekday:"narrow"}),
          isWeekend:day===0||day===6||holiday,
          isHoliday:holiday,
          isToday:date===t,
        };
      });
    });

    const workDaysInMonth=computed(()=>reportDays.value.filter(d=>!d.isWeekend&&!d.isHoliday).length);
    const reportEmployees=computed(()=>reportEmpFilter.value?employees.value.filter(e=>e.id===reportEmpFilter.value):employees.value);

    // helper functions for history calendar
    const prevMonth=m=>{const[y,mo]=m.split('-').map(Number);const d=new Date(y,mo-2,1);return d.toISOString().slice(0,7);};
    const nextMonth=m=>{const[y,mo]=m.split('-').map(Number);const d=new Date(y,mo,1);return d.toISOString().slice(0,7);};
    const historyMonthLabel=computed(()=>{const[y,mo]=historyMonth.value.split('-').map(Number);return new Date(y,mo-1,1).toLocaleDateString('pl-PL',{month:'long',year:'numeric'});});
    const historyCalendar=computed(()=>{
      const[year,mon]=historyMonth.value.split('-').map(Number);
      const dim=new Date(year,mon,0).getDate();
      const firstDay=new Date(year,mon-1,1).getDay();
      const offset=(firstDay===0?6:firstDay-1);
      const cells=[];
      for(let i=0;i<offset;i++)cells.push({empty:i});
      for(let i=1;i<=dim;i++){
        const dt=new Date(year,mon-1,i);
        const date=dt.toISOString().slice(0,10);
        const day=dt.getDay();
        const hol=isHoliday(date);cells.push({date,num:i,isWeekend:day===0||day===6||hol,isHoliday:hol,isToday:date===todayStr()});
      }
      return cells;
    });
    const reportMonthLabel=computed(()=>{const[year,mon]=reportMonth.value.split("-").map(Number);return new Date(year,mon-1,1).toLocaleDateString("pl-PL",{month:"long",year:"numeric"});});
    const printDate=computed(()=>new Date().toLocaleDateString("pl-PL",{day:"numeric",month:"long",year:"numeric"}));

    const empSummary=computed(()=>{}); // placeholder — use function below

    const totalStaz=computed(()=>{if(!empForm.value.hireDate)return 0;const hired=new Date(empForm.value.hireDate+"T12:00:00");const yrs=(new Date()-hired)/(1000*60*60*24*365.25);return Math.round((empForm.value.prevWorkYears||0)+yrs);});
    const suggestedEntitlement=computed(()=>calcKPEntitlement(empForm.value.hireDate,empForm.value.prevWorkYears||0));
    const autoCalcEntitlement=()=>{empForm.value.leaveEntitlement=suggestedEntitlement.value;};

    const myTodayStatus=computed(()=>currentUser.value?getAtt(currentUser.value.id,today.value):null);
    const myBalance=computed(()=>currentUser.value?calcBalance(currentUser.value.id,currentUser.value.leaveEntitlement||26):{entitlement:26,used:0,remaining:26,zadUsed:0});
    const myLeaves=computed(()=>currentUser.value?leaveReqs.value.filter(r=>r.userId===currentUser.value.id).sort((a,b)=>b.createdAt.localeCompare(a.createdAt)):[]);
    const leaveDays=computed(()=>workDaysBetween(leaveForm.value.dateFrom,leaveForm.value.dateTo));
    const last7=computed(()=>Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()-6+i);return d.toISOString().slice(0,10);}));
    const last30=computed(()=>Array.from({length:30},(_,i)=>{const d=new Date();d.setDate(d.getDate()-29+i);return d.toISOString().slice(0,10);}));

    // helpers
    const getAtt=(uid,date)=>attendance.value[`${uid}_${date}`]||null;

    const getCellStyle=(uid,date)=>{
      const st=getAtt(uid,date);
      const a=ATT_MAP[st];
      if(a)return`background:${a.bg};color:${a.text}`;
      return"background:#f5f5f5;color:#bbb";
    };

    const empSummaryFn=(uid)=>{
      const days=reportDays.value.filter(d=>!d.isWeekend);
      const recs=days.map(d=>getAtt(uid,d.date));
      const obecny=recs.filter(s=>s==="obecny").length;
      const urlop=recs.filter(s=>s==="urlop").length;
      const home=recs.filter(s=>s==="home"||s==="delegacja").length;
      const nieobecny=recs.filter(s=>s==="nieobecny").length;
      const pct=workDaysInMonth.value>0?Math.round(((obecny+home)/workDaysInMonth.value)*100):0;
      return{obecny,urlop,home,nieobecny,pct};
    };

    const calcBalance=(uid,entitlement)=>{
      const year=thisYear().toString();
      // Zlicz dni oznaczone jako "urlop" w kalendarzu w tym roku
      const urlOpDays=Object.entries(attendance.value)
        .filter(([key,status])=>key.startsWith(uid+'_')&&status==='urlop'&&key.split('_')[1]?.startsWith(year))
        .length;
      // Zlicz urlop na żądanie z zatwierdzonych wniosków (do kontroli limitu 4 dni)
      const approved=leaveReqs.value.filter(r=>r.userId===uid&&r.status==="approved"&&r.dateFrom.startsWith(year));
      const zadUsed=Math.min(approved.filter(r=>r.type==="zadanie").reduce((s,r)=>s+r.days,0),4);
      const used=urlOpDays;
      return{entitlement,used,zadUsed,remaining:Math.max(0,entitlement-used)};
    };

    const getUserBalance=uid=>{const u=allUsers.value.find(x=>x.id===uid);return u?calcBalance(uid,u.leaveEntitlement||26).remaining:"?";};
    const avatarBg=id=>AVC_BG[parseInt(id||"0")%AVC_BG.length];
    const avatarColor=id=>AVC_COL[parseInt(id||"0")%AVC_COL.length];
    const initials=n=>(n||"?").split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2);
    const weekdayShort=d=>new Date(d+"T12:00:00").toLocaleDateString("pl-PL",{weekday:"narrow"});
    const dayNum=d=>new Date(d+"T12:00:00").getDate();
    const isWeekend=d=>{const day=new Date(d+"T12:00:00").getDay();return day===0||day===6;};
    const statusLabel=s=>({pending:"Oczekuje",approved:"Zatwierdzone",rejected:"Odrzucone",cancelled:"Anulowane"})[s]||s;
    const statusBadge=s=>({pending:"background:#FAEEDA;color:#412402",approved:"background:#E1F5EE;color:#04342C",rejected:"background:#FCEBEB;color:#501313",cancelled:"background:#F1EFE8;color:#2C2C2A"})[s]||"";

    // cykl statusów przy kliknięciu komórki: brak → OB → NB → HO → DL → UR → brak
    const cycleAtt=async(uid,date)=>{
      const cur=getAtt(uid,date);
      const idx=ATT_KEYS.indexOf(cur);
      const next=idx===-1?ATT_KEYS[0]:(idx===ATT_KEYS.length-1?null:ATT_KEYS[idx+1]);
      const docId=`${uid}_${date}`;
      if(next){
        attendance.value[docId]=next;
        if(db)await db.collection("attendance").doc(docId).set({userId:uid,date,status:next});
      } else {
        delete attendance.value[docId];
        if(db)await db.collection("attendance").doc(docId).delete();
      }
      attendance.value={...attendance.value};
    };

    // Firebase
    const loadData=async()=>{
      if(!db)return;
      const snap=await db.collection("users").get();
      if(snap.empty){const r=db.collection("users").doc();await r.set({...DEFAULT_ADMIN,createdAt:todayStr()});allUsers.value=[{id:r.id,...DEFAULT_ADMIN}];}
      else allUsers.value=snap.docs.map(d=>({id:d.id,...d.data()}));
      const attSnap=await db.collection("attendance").get();
      const attMap={};attSnap.docs.forEach(d=>{attMap[d.id]=d.data().status;});
      attendance.value=attMap;
      const lSnap=await db.collection("leaves").orderBy("createdAt","desc").get();
      leaveReqs.value=lSnap.docs.map(d=>({id:d.id,...d.data()}));
      const nSnap=await db.collection("att_notes").get();
      const notesMap={};nSnap.docs.forEach(d=>{notesMap[d.id]=d.data();});
      notes.value=notesMap;
    };

    const doLogin=async()=>{
      loginError.value="";loginLoading.value=true;
      const user=allUsers.value.find(u=>u.login===loginForm.value.login.trim()&&u.password===loginForm.value.password);
      if(user)currentUser.value=user;
      else loginError.value="Nieprawidłowy login lub hasło";
      loginLoading.value=false;
    };
    const doLogout=()=>{currentUser.value=null;};

    const toggleAtt=async(uid,date,key)=>{
      const docId=`${uid}_${date}`;
      const cur=attendance.value[docId];
      const newS=cur===key?null:key;
      if(newS){attendance.value[docId]=newS;if(db)await db.collection("attendance").doc(docId).set({userId:uid,date,status:newS});}
      else{delete attendance.value[docId];if(db)await db.collection("attendance").doc(docId).delete();}
      attendance.value={...attendance.value};
    };

    const openAddEmp=()=>{empForm.value={open:true,id:null,name:"",login:"",password:"haslo123",role:"employee",department:"",position:"",hireDate:todayStr(),prevWorkYears:0,leaveEntitlement:20};};
    const openEditEmp=u=>{empForm.value={open:true,...u,prevWorkYears:u.prevWorkYears||0};};
    const saveEmployee=async()=>{
      const f=empForm.value;if(!f.name||!f.login)return;
      const data={name:f.name,login:f.login,password:f.password,role:f.role,department:f.department||"",position:f.position||"",hireDate:f.hireDate,prevWorkYears:f.prevWorkYears||0,leaveEntitlement:parseInt(f.leaveEntitlement)||20,workStart:f.workStart||"08:00",workEnd:f.workEnd||"16:00"};
      if(f.id){if(db)await db.collection("users").doc(f.id).update(data);allUsers.value=allUsers.value.map(u=>u.id===f.id?{...u,...data}:u);if(currentUser.value?.id===f.id)currentUser.value={...currentUser.value,...data};}
      else{let id=Date.now().toString();if(db){const r=await db.collection("users").add({...data,createdAt:todayStr()});id=r.id;}allUsers.value=[...allUsers.value,{id,...data}];}
      empForm.value={open:false};
    };
    const deleteEmployee=async id=>{if(!confirm("Usunąć pracownika?"))return;if(db)await db.collection("users").doc(id).delete();allUsers.value=allUsers.value.filter(u=>u.id!==id);};
    const saveNote=async(uid,date,modifier,note)=>{
      const key=`${uid}_${date}`;
      if(modifier||note){
        notes.value[key]={modifier,note};
        if(db)await db.collection("att_notes").doc(key).set({userId:uid,date,modifier,note});
      } else {
        delete notes.value[key];
        if(db)await db.collection("att_notes").doc(key).delete();
      }
      notes.value={...notes.value};
    };
    const getNote=(uid,date)=>notes.value[`${uid}_${date}`]||null;
    const MODIFIERS=[
      {key:"",label:"W normie"},
      {key:"late",label:"Spóźnienie",color:"#BA7517",bg:"#FAEEDA"},
      {key:"early",label:"Wyjście wcześniej",color:"#534AB7",bg:"#EEEDFE"},
      {key:"overtime",label:"Nadgodziny",color:"#0F6E56",bg:"#E1F5EE"},
    ];
    const MOD_MAP=Object.fromEntries(MODIFIERS.map(m=>[m.key,m]));
    const resolveLeave=async(id,status)=>{
      if(db)await db.collection("leaves").doc(id).update({status,resolvedAt:todayStr()});
      leaveReqs.value=leaveReqs.value.map(r=>r.id===id?{...r,status,resolvedAt:todayStr()}:r);
      // Automatycznie zaznacz/odznacz UR w kalendarzu
      const req=leaveReqs.value.find(r=>r.id===id);
      if(req&&(req.type==="wypoczynkowy"||req.type==="zadanie"||req.type==="okolicznosciowy")){
        const d=new Date(req.dateFrom+"T12:00:00"),e=new Date(req.dateTo+"T12:00:00");
        while(d<=e){
          const date=d.toISOString().slice(0,10);
          if(isWorkDay(date)){
            const docId=`${req.userId}_${date}`;
            if(status==="approved"){
              attendance.value[docId]="urlop";
              if(db)await db.collection("attendance").doc(docId).set({userId:req.userId,date,status:"urlop"});
            } else if(status==="cancelled"||status==="rejected"){
              if(attendance.value[docId]==="urlop"){
                delete attendance.value[docId];
                if(db)await db.collection("attendance").doc(docId).delete();
              }
            }
          }
          d.setDate(d.getDate()+1);
        }
        attendance.value={...attendance.value};
      }
    };
    const cancelLeave=async id=>{if(!confirm("Cofnąć urlop? Dni wrócą do salda."))return;await resolveLeave(id,"cancelled");};
    const submitLeave=async()=>{
      if(leaveDays.value===0)return;
      const bal=myBalance.value;
      if(leaveForm.value.type==="wypoczynkowy"&&leaveDays.value>bal.remaining){leaveMsg.value={ok:false,text:"Za mało dni. Masz "+bal.remaining+" dni, wnioskujesz o "+leaveDays.value+"."};return;}
      if(leaveForm.value.type==="zadanie"&&leaveDays.value>(4-bal.zadUsed)){leaveMsg.value={ok:false,text:"Przekroczony limit na żądanie. Pozostało "+(4-bal.zadUsed)+" z 4 dni."};return;}
      const req={userId:currentUser.value.id,userName:currentUser.value.name,type:leaveForm.value.type,dateFrom:leaveForm.value.dateFrom,dateTo:leaveForm.value.dateTo,days:leaveDays.value,note:leaveForm.value.note,status:"pending",createdAt:todayStr()};
      let id=Date.now().toString();if(db){const r=await db.collection("leaves").add(req);id=r.id;}
      leaveReqs.value=[{id,...req},...leaveReqs.value];
      leaveForm.value={type:"wypoczynkowy",dateFrom:"",dateTo:"",note:""};
      leaveMsg.value={ok:true,text:"Wniosek wysłany. Po zatwierdzeniu odejmie "+req.days+" dni od salda."};
      setTimeout(()=>leaveMsg.value=null,5000);
    };
    const exportExcel=()=>{
      if(!window.XLSX){alert("Biblioteka Excel nie załadowana");return;}
      const XLSX=window.XLSX;
      const wb=XLSX.utils.book_new();
      // Arkusz zbiorczy
      const header=["Pracownik",...reportDays.value.map(d=>d.num),"OB","UR","HO","NB","%","Urlop pozostały","Uwagi"];
      const rows=[header];
      reportEmployees.value.forEach(emp=>{
        const row=[emp.name];
        reportDays.value.forEach(d=>{
          if(d.isWeekend)row.push("–");
          else row.push(getAtt(emp.id,d.date)?ATT_MAP[getAtt(emp.id,d.date)]?.short:"");
        });
        const s=empSummaryFn(emp.id);
        const bal=calcBalance(emp.id,emp.leaveEntitlement||26);
        // Collect notes for the month
        const empNotes=reportDays.value.filter(d=>!d.isWeekend&&getNote(emp.id,d.date)?.modifier).map(d=>{const n=getNote(emp.id,d.date);return d.num+"."+n.modifier+(n.note?" ("+n.note+")":"");}).join(", ");
        row.push(s.obecny,s.urlop,s.home,s.nieobecny,s.pct+"%",bal.remaining+"/"+bal.entitlement+"d",empNotes);
        rows.push(row);
      });
      const ws=XLSX.utils.aoa_to_sheet(rows);
      // Szerokość kolumn
      ws["!cols"]=[{wch:22},...reportDays.value.map(()=>({wch:3})),{wch:5},{wch:5},{wch:5},{wch:5},{wch:6},{wch:10}];
      XLSX.utils.book_append_sheet(wb,ws,"Lista obecności");
      // Arkusze indywidualne
      reportEmployees.value.forEach(emp=>{
        const hdr=["Dzień","Dzień tyg.",...reportDays.value.map(d=>d.num),"OB","UR","HO","NB","%"];
        const empRows=[hdr];
        const statusRow=[emp.name,"Status"];
        reportDays.value.forEach(d=>{
          if(d.isWeekend)statusRow.push("–");
          else statusRow.push(getAtt(emp.id,d.date)?ATT_MAP[getAtt(emp.id,d.date)]?.short:"");
        });
        const s=empSummaryFn(emp.id);
        statusRow.push(s.obecny,s.urlop,s.home,s.nieobecny,s.pct+"%");
        empRows.push(statusRow);
        const ws2=XLSX.utils.aoa_to_sheet(empRows);
        ws2["!cols"]=[{wch:20},{wch:10},...reportDays.value.map(()=>({wch:3})),{wch:5},{wch:5},{wch:5},{wch:5},{wch:6}];
        const safeName=emp.name.replace(/[^a-zA-Z0-9 ]/g,"").slice(0,28);
        XLSX.utils.book_append_sheet(wb,ws2,safeName);
      });
      const monthStr=reportMonth.value.replace("-","_");
      XLSX.writeFile(wb,`lista_obecnosci_${monthStr}.xlsx`);
    };
    const printReport=()=>{printMode.value='all';setTimeout(()=>window.print(),50);setTimeout(()=>printMode.value='',500);};
    const printIndividual=()=>{printMode.value='individual';setTimeout(()=>window.print(),50);setTimeout(()=>printMode.value='',500);};

    onMounted(async()=>{await loadData();loading.value=false;});



    return{
      loading,currentUser,allUsers,employees,attendance,leaveReqs,
      loginForm,loginError,loginLoading,adminTab,empTab,leaveFilter,reportMonth,
      empForm,leaveForm,leaveMsg,leaveDays,
      today,todayLabel,todayMetrics,pendingCount,leaveFilters,filteredLeaves,
      reportDays,workDaysInMonth,reportMonthLabel,printDate,reportEmpFilter,reportEmployees,printMode,
      myTodayStatus,myBalance,myLeaves,last7,last30,historyMonth,currentMonthStr,historyMonthLabel,historyCalendar,prevMonth,nextMonth,
      totalStaz,suggestedEntitlement,autoCalcEntitlement,
      ATT,ATT_MAP,LT,LEAVE_TYPES,
      doLogin,doLogout,toggleAtt,cycleAtt,openAddEmp,openEditEmp,saveEmployee,deleteEmployee,printIndividual,exportExcel,
      resolveLeave,cancelLeave,submitLeave,printReport,getUserBalance,
      getAtt,getCellStyle,empSummary:empSummaryFn,calcBalance,notes,getNote,saveNote,MODIFIERS,MOD_MAP,
      avatarBg,avatarColor,initials,weekdayShort,dayNum,isWeekend,
      statusLabel,statusBadge,fmtD,
    };
  }
}).mount('#app');
</script>
</body>
</html>
